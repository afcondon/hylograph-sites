<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tooltips</title>
  <style>
    body {
      margin: 40px auto;
      max-width: 720px;
      font-family: system-ui, -apple-system, sans-serif;
      color: #333;
      background: #fafafa;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    #chart {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 8px;
    }
    .highlight-primary {
      opacity: 1 !important;
    }
    .highlight-dimmed {
      opacity: 0.25 !important;
    }
    .psd3-tooltip {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Tooltips on HATS Elements</h1>
  <div id="chart"></div>
  <script src="bundle.js"></script>
</body>
</html>
