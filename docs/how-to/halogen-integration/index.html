<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halogen + HATS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      padding: 3rem 1rem;
    }
    .app { max-width: 600px; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    p { margin-bottom: 1rem; color: #555; }
    .controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    button {
      font-size: 1.25rem;
      width: 2.5rem;
      height: 2.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      line-height: 1;
    }
    button:hover { background: #f0f0f0; }
    #viz { min-height: 40px; }
  </style>
</head>
<body>
  <script src="bundle.js"></script>
</body>
</html>
