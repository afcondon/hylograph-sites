<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Hover - HATS How-To</title>
  <style>
    body {
      margin: 48px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #333;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    p  { font-size: 14px; color: #666; margin-bottom: 24px; }

    .hoverable {
      cursor: pointer;
      transition: opacity 0.15s ease, stroke-width 0.15s ease;
      stroke: transparent;
      stroke-width: 0;
      transform-box: fill-box;
      transform-origin: center;
    }
    .hoverable:hover {
      opacity: 0.85;
      stroke: #222;
      stroke-width: 3;
    }
  </style>
</head>
<body>
  <h1>CSS Hover</h1>
  <p>Pure CSS :hover on HATS elements. No JavaScript behavior needed.</p>
  <div id="app"></div>
  <script type="module" src="bundle.js"></script>
</body>
</html>
